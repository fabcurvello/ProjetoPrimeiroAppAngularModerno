<p>lista-produtos works!</p>

@for (item of produtos(); track item.nome) {
  <app-produto
    [nome]="item.nome"
    [preco]="item.preco"
    (produtoSelecionado)="exibirProduto($event)"
  ></app-produto>
}
<br>
<button (click)="adicionarProduto()">
  Adicionar Produto
</button>

<button (click)="substituirProdutos()">
  Substituir Lista
</button>

<h2>Total de produtos: {{ totalProdutos() }}</h2>

<h3>Valor total: R$ {{ valorTotal() }}</h3>
